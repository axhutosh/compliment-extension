<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Amazing</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0c0a;
      --card: #161310;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --cream: #f5edd8;
      --muted: #7a6e5f;
      --glow: rgba(201, 168, 76, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 380px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-1 {
      width: 200px; height: 200px;
      background: rgba(201, 168, 76, 0.07);
      top: -60px; left: -40px;
    }
    .bg-glow-2 {
      width: 160px; height: 160px;
      background: rgba(180, 100, 60, 0.06);
      bottom: -40px; right: -30px;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 24px;
      min-height: 380px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    /* Compliment card */
    .card {
      background: var(--card);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 16px;
      padding: 28px 22px;
      width: 100%;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 0 40px var(--glow), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .card::before {
      content: '"';
      font-family: 'Playfair Display', serif;
      font-size: 80px;
      color: var(--gold);
      opacity: 0.08;
      position: absolute;
      top: -10px;
      left: 14px;
      line-height: 1;
      pointer-events: none;
    }

    .compliment-emoji {
      font-size: 28px;
      margin-bottom: 12px;
      display: block;
      animation: floatIn 0.5s ease forwards;
    }

    .compliment-text {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.65;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }

    .compliment-author {
      margin-top: 14px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    /* Streak badge */
    .streak {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--gold-light);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .streak-fire { font-size: 13px; }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--gold), #a87932);
      border: none;
      border-radius: 12px;
      color: #1a1208;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.25);
      text-transform: uppercase;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(201, 168, 76, 0.4);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Copy button */
    .btn-copy {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .btn-copy:hover {
      color: var(--gold);
      border-color: rgba(201, 168, 76, 0.5);
    }

    .btn-copy.copied {
      color: #6dbf8a;
      border-color: rgba(109, 191, 138, 0.4);
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
      margin: 4px 0 16px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card.refresh .compliment-emoji,
    .card.refresh .compliment-text,
    .card.refresh .compliment-author {
      animation: none;
      opacity: 1;
    }

    .card.animating .compliment-emoji {
      animation: floatIn 0.4s ease forwards;
    }
    .card.animating .compliment-text {
      opacity: 0;
      animation: fadeUp 0.4s ease 0.1s forwards;
    }
    .card.animating .compliment-author {
      opacity: 0;
      animation: fadeUp 0.4s ease 0.2s forwards;
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="header">
      <p class="eyebrow">A little reminder</p>
      <h1>You're Amazing ✨</h1>
    </div>

    <div class="card" id="card">
      <span class="compliment-emoji" id="emoji">🌟</span>
      <p class="compliment-text" id="compliment">Loading your compliment...</p>
      <p class="compliment-author" id="author">— just for you</p>
    </div>

    <div class="streak" id="streak">
      <span class="streak-fire">🔥</span>
      <span id="streak-text">Loading streak...</span>
    </div>

    <div class="divider"></div>

    <button class="btn" id="newBtn">Another one ✦</button>
    <button class="btn-copy" id="copyBtn">Copy to clipboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
